<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pre Flight Check DJI T50/T100</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0f172a;padding:20px;}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:12px;}
h2{text-align:center;color:#1e3a8a;}

label{font-weight:bold;margin-top:10px;display:block;}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;}

.check-group{background:#f1f5f9;padding:10px;border-radius:10px;margin-top:10px;}
.check-options{display:flex;gap:6px;}
.check-options input{display:none;}
.check-options label{padding:4px 10px;border:1px solid #ccc;border-radius:6px;cursor:pointer;font-size:12px;}

.check-options input.good:checked + label{background:#22c55e;color:#fff;}
.check-options input.bad:checked + label{background:#ef4444;color:#fff;}

button{width:100%;margin-top:15px;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;}
.pdf-btn{background:#16a34a;}

.dashboard{max-width:600px;margin:20px auto;background:#fff;padding:15px;border-radius:12px;}
.card{border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:8px;font-size:12px;}
.card img{width:100%;margin-top:8px;border-radius:8px;}
</style>
</head>

<body>

<div class="container">
<h2>Pre Flight Check DJI T50/T100</h2>

<form id="form">

<label>Tanggal</label>
<input id="tanggal" type="date" required>

<label>Operator</label>
<select id="operator">
<option>Aziz</option><option>Banu</option><option>Sahrul</option>
<option>Afridus</option><option>Rikson</option><option>Aqmal</option><option>Kifli</option>
</select>

<label>Unit</label>
<select id="unit">
<option>DJIT50-01</option><option>DJIT50-02</option>
<option>DJIT50-03</option><option>DJIT50-04</option>
<option>DJIT50-05</option><option>DJIT50-06</option><option>DJIT100-01</option>
</select>

<label>Paddock</label>
<input id="paddock">

<label>Application</label>
<input id="application">

<label>Start Time</label>
<input type="time" id="starttime">

<label>Foto</label>
<input type="file" id="foto">

<!-- CHECKLIST -->
<div id="checks"></div>

<button type="submit">Submit</button>
</form>

<button class="pdf-btn" onclick="exportPDF()">Export PDF</button>
</div>

<div class="dashboard">
<h3>Dashboard</h3>
<div id="list"></div>
</div>

<script>
const checkItems=[
"Motor & Propeller","Battery & Port","RTK",
"Tank & Flow Meter","Wheighing Sensor",
"Atomized Sprinkler","Parameter","Chemical",
"Wind Average","Obstacle"
];

/* RENDER CHECKLIST */
let html="";
checkItems.forEach((c,i)=>{
html+=`
<div class="check-group">
<span>${c}</span>
<div class="check-options">
<input type="radio" name="c${i}" value="Good" class="good" id="g${i}">
<label for="g${i}">Good</label>

<input type="radio" name="c${i}" value="Bad" class="bad" id="b${i}">
<label for="b${i}">Bad</label>
</div>
</div>`;
});
document.getElementById("checks").innerHTML=html;

/* IMAGE */
let img="";
foto.onchange=e=>{
let reader=new FileReader();
reader.onload=()=>img=reader.result;
reader.readAsDataURL(e.target.files[0]);
};

/* DATA */
let dataList=JSON.parse(localStorage.getItem("data"))||[];

form.onsubmit=e=>{
e.preventDefault();

let checks={};
checkItems.forEach((c,i)=>{
let val=document.querySelector(`input[name=c${i}]:checked`);
checks[c]=val?val.value:"-";
});

let data={
tanggal:tanggal.value,
operator:operator.value,
unit:unit.value,
paddock:paddock.value,
application:application.value,
start:starttime.value,
foto:img,
checks
};

dataList.push(data);
localStorage.setItem("data",JSON.stringify(dataList));
render();
form.reset();
img="";
alert("Tersimpan!");
};

/* DASHBOARD */
function render(){
let html="";
dataList.forEach((d,i)=>{
html+=`
<div class="card">
<b>${i+1}. ${d.tanggal}</b><br>
${d.operator} | ${d.unit}<br>
${d.application}<br>
${d.start}<br>
${d.foto?`<img src="${d.foto}">`:""}
</div>`;
});
list.innerHTML=html;
}
render();

/* PDF */
function exportPDF(){
const { jsPDF }=window.jspdf;
let doc=new jsPDF();
let y=10;

doc.setFontSize(14);
doc.text("PRE FLIGHT CHECK REPORT",10,y); y+=6;
doc.text("DJI T50 / T100",10,y); y+=6;
doc.line(10,y,200,y); y+=8;

dataList.forEach((d,i)=>{

doc.setFontSize(10);
doc.text(`No: ${i+1}`,10,y); y+=5;
doc.text(`Tanggal: ${d.tanggal}`,10,y); y+=5;
doc.text(`Operator: ${d.operator}`,10,y); y+=5;
doc.text(`Unit: ${d.unit}`,10,y); y+=5;
doc.text(`Paddock: ${d.paddock}`,10,y); y+=5;
doc.text(`Application: ${d.application}`,10,y); y+=5;
doc.text(`Start: ${d.start}`,10,y); y+=6;

doc.text("Checklist:",10,y); y+=5;

Object.entries(d.checks).forEach(([k,v])=>{
let symbol = v==="Good" ? "✓" : v==="Bad" ? "✗" : "-";
doc.text(`${k}: ${symbol} ${v}`,12,y);
y+=5;
});

/* IMAGE */
if(d.foto){
doc.addImage(d.foto,"JPEG",10,y,60,45);
y+=50;
}

doc.line(10,y,200,y);
y+=10;

if(y>260){doc.addPage();y=10;}

});

doc.save("DJI_Report.pdf");
}
</script>

</body>
</html>
