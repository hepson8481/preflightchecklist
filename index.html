<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pre Flight Check DJI T50/T100</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  margin:0;
  padding:20px;
}

.container{
  max-width:520px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

h2{
  text-align:center;
  color:#1e3a8a;
}

label{font-weight:bold;display:block;margin-top:10px;}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* CHECK */
.check-group{
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.check-group span{
  font-weight:bold;
  display:block;
  margin-bottom:6px;
}

.check-options{
  display:flex;
  gap:6px;
}

.check-options input{display:none;}

.check-options label{
  padding:4px 10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:12px;
  cursor:pointer;
  background:#fff;
}

/* OK */
.check-options input.ok:checked + label.ok{
  background:#22c55e;
  color:#fff;
  border-color:#22c55e;
}

/* NOT OK */
.check-options input.notok:checked + label.notok{
  background:#ef4444;
  color:#fff;
  border-color:#ef4444;
}

/* BUTTON */
button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
button:hover{background:#1d4ed8;}

/* DASHBOARD */
.dashboard{
  max-width:520px;
  margin:20px auto;
  background:#fff;
  padding:15px;
  border-radius:12px;
}

.card{
  border:1px solid #ddd;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  font-size:12px;
}

.pdf-btn{
  background:#16a34a;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Pre Flight Check DJI T50/T100</h2>

<form id="form">

<label>Tanggal</label>
<input id="tanggal" type="date" required>

<label>Operator</label>
<select id="operator">
<option>Aziz</option>
<option>Banu</option>
<option>Sahrul</option>
<option>Afridus</option>
<option>Rikson</option>
<option>Aqmal</option>
<option>Kifli</option>
</select>

<label>Unit Code</label>
<select id="unit">
<option>DJIT50-01</option>
<option>DJIT50-02</option>
<option>DJIT50-03</option>
<option>DJIT50-04</option>
<option>DJIT50-05</option>
<option>DJIT50-06</option>
<option>DJIT100-01</option>
</select>

<label>Paddock</label>
<input id="paddock" required>

<label>Application</label>
<input id="application" required>

<!-- ================= CHECKLIST ================= -->

<div class="check-group">
<span>Propeller</span>
<div class="check-options">
<input type="radio" name="prop" id="p1" class="ok"><label for="p1" class="ok">OK</label>
<input type="radio" name="prop" id="p2" class="notok"><label for="p2" class="notok">Not OK</label>
</div>
</div>

<div class="check-group">
<span>Battery</span>
<div class="check-options">
<input type="radio" name="bat" id="b1" class="ok"><label for="b1" class="ok">OK</label>
<input type="radio" name="bat" id="b2" class="notok"><label for="b2" class="notok">Not OK</label>
</div>
</div>

<!-- 🔥 TAMBAHAN DI BAWAH BATTERY -->

<div class="check-group">
<span>Mission</span>
<div class="check-options">
<input type="radio" name="mission" id="m1" class="ok"><label for="m1" class="ok">OK</label>
<input type="radio" name="mission" id="m2" class="notok"><label for="m2" class="notok">Not OK</label>
</div>
</div>

<div class="check-group">
<span>Parameter</span>
<div class="check-options">
<input type="radio" name="parameter" id="pa1" class="ok"><label for="pa1" class="ok">OK</label>
<input type="radio" name="parameter" id="pa2" class="notok"><label for="pa2" class="notok">Not OK</label>
</div>
</div>

<div class="check-group">
<span>RTK</span>
<div class="check-options">
<input type="radio" name="rtk" id="r1" class="ok"><label for="r1" class="ok">OK</label>
<input type="radio" name="rtk" id="r2" class="notok"><label for="r2" class="notok">Not OK</label>
</div>
</div>

<div class="check-group">
<span>Wind</span>
<div class="check-options">
<input type="radio" name="wind" id="w1" class="ok"><label for="w1" class="ok">OK</label>
<input type="radio" name="wind" id="w2" class="notok"><label for="w2" class="notok">Not OK</label>
</div>
</div>

<div class="check-group">
<span>Tank</span>
<div class="check-options">
<input type="radio" name="tank" id="t1" class="ok"><label for="t1" class="ok">OK</label>
<input type="radio" name="tank" id="t2" class="notok"><label for="t2" class="notok">Not OK</label>
</div>
</div>

<div class="check-group">
<span>Chemical</span>
<div class="check-options">
<input type="radio" name="chemical" id="c1" class="ok"><label for="c1" class="ok">OK</label>
<input type="radio" name="chemical" id="c2" class="notok"><label for="c2" class="notok">Not OK</label>
</div>
</div>

<div class="check-group">
<span>Obstacle</span>
<div class="check-options">
<input type="radio" name="obstacle" id="o1" class="ok"><label for="o1" class="ok">OK</label>
<input type="radio" name="obstacle" id="o2" class="notok"><label for="o2" class="notok">Not OK</label>
</div>
</div>

<button type="submit">Submit</button>
</form>

<button class="pdf-btn" onclick="exportPDF()">Export PDF</button>

</div>

<!-- DASHBOARD -->
<div class="dashboard">
<h3>Dashboard Flight Check</h3>
<div id="list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let dataList = JSON.parse(localStorage.getItem("flightData")) || [];

document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let data = {
tanggal: tanggal.value,
operator: operator.value,
unit: unit.value,
paddock: paddock.value,
application: application.value
};

dataList.push(data);
localStorage.setItem("flightData", JSON.stringify(dataList));

render();
alert("Data tersimpan!");
this.reset();
});

function render(){
let html = "";
dataList.forEach((d,i)=>{
html += `
<div class="card">
<b>${i+1}. ${d.tanggal}</b><br>
Operator: ${d.operator}<br>
Unit: ${d.unit}<br>
Paddock: ${d.paddock}<br>
Application: ${d.application}
</div>`;
});
document.getElementById("list").innerHTML = html;
}
render();

/* PDF EXPORT */
function exportPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let y = 10;
doc.text("Laporan Pre Flight DJI T50/T100",10,y);
y += 10;

dataList.forEach((d,i)=>{
doc.text(`${i+1}. ${d.tanggal} | ${d.operator} | ${d.unit}`,10,y);
y += 8;
doc.text(`Paddock: ${d.paddock}`,10,y);
y += 8;
doc.text(`Application: ${d.application}`,10,y);
y += 10;
});

doc.save("laporan-flight-check.pdf");
}
</script>

</body>
</html>
